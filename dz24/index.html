<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
<h1 style="text-align: center;">Калькулятор перевода валюты</h1>
<h3>Калькулятор нахождения необходимой суммы для покупки валюты</h3>
    <input type="text" class="money" placeholder="Введите нужное количество">
    <div>
        <button class="money1" data-pet="71.21">USD</button>
        <button class="money1" data-pet="82.54">EUR</button>
        <button class="money1" data-pet="10.48">CNY</button>
    </div>
    <div>Сумма: <span class="sum"></span></div>
    <br>
    <h3>Калькулятор нахождения количество валюты, на имеющуюся сумму</h3>
    <input type="text" class="count" placeholder="Введите сумму">
    <div>
        <button class="count1" data-sum="71.21">USD</button>
        <button class="count1" data-sum="82.54">EUR</button>
        <button class="count1" data-sum="10.48">CNY</button>
    </div>
    <div>На сумму, указанную в поле, вы можете купить: <span class="sum1"></span></div>
    <script src="script.js">
    </script>
</body>

</html>
