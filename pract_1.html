<html>

<head>
  <meta http-equiv="content-type" content="text/html; charset=utf-8" />
</head>

<body>
  <form action="#test.php" method="post" id="f1">
    <p>Логин: <input id="login" name="login" type="text" onKeyUp="check('login', reg_login)" /></p>
    <p>Имя: <input id="name" name="name" type="text" onKeyUp="check('name', reg_name)" /></p>
    <p>Дата: <input id="date" name="date" type="text" onKeyUp="check('date', reg_date)" /></p>
    <p>Пароль: <input id="pass" name="pass" type="password" onKeyUp="check('pass', reg_pass)" /></p>
  </form>


  <script>
    let dat = document.getElementById("date");
    let d = document.getElementById("date");
    let reg_date = /^((19|20)\d{2})-(0[1-9]|1[0-2])-(0[1-9][12][0-9]|3[01])$/;
    dat.addEventListener("focus", function () {
      console.log(d.value);
      let mas = d.value.split("-");

      switch (mas[1]) {
        case "01":
        case "03":
        case "05":
        case "07":
        case "08":
        case "10":
        case "12":
          reg_date = /^((19|20)\d{2})-(0[1-9]|1[0-2])-(0[1-9][12][0-9]|3[01])$/;
          break;
        case "04":
        case "06":
        case "09":
        case "11":
          reg_date = /^((19|20)\d{2})-(0[1-9]|1[0-2])-(0[1-9][12][0-9]|30)$/;
          break;
        case "02":
          if (mas[0] % 4 == 0) {
            reg_date = /^((19|20)\d{2})-(0[1-9]|1[0-2])-(0[1-9][12][0-9]|2(0-9))$/;
          } else {
            reg_date = /^((19|20)\d{2})-(0[1-9]|1[0-2])-(0[1-9][12][0-9]|2(0-8))$/;
          }
          break;
        default:
          reg_date = "";
      }
    });

    let reg_login = /^[a-z_-]{3,25}$/i;
    let reg_name = /^[а-яё]{2,}$/i;
    let reg_pass = /^[\w.+*_-]{6,25}$/

    /*
    Дата: 2021-01-31
    Логин: английские буквы в любом регистре, подчеркивание и дефис
    Имя: русские буквы в любом регистре
    Пароль: английские буквы в любом регистре, цифры, знаки: +*_- и точка 
    */

    function check(id, reg) { //функция проверки полей, принимает значение id поля и регулярное выражение для него
      let st = document.getElementById(id);
      let v = document.getElementById(id).value;


      if (reg.test(v)) {
        st.style.border = '1px solid green';
        return true;
      }
      else {
        st.style.border = '1px solid red';
        return false;
      }
    }
  </script>
</body>

</html>
